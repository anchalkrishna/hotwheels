<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .box {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-hot {
            background: #ff4d4d;
            color: white;
            border-radius: 20px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="box">

    <h3 class="text-center mb-4">Checkout</h3>

    <h5>Order Summary</h5>
    {% for item in items %}
        <p>{{ item.product.name }} × {{ item.quantity }}</p>
    {% endfor %}

    <h5>Total: ₹{{ total }}</h5>

    <hr>

    <form method="post">
        {% csrf_token %}

        <h5>Select Payment Method</h5>

        <div class="form-check">
            <input type="radio" name="payment" value="Cash on Delivery" required>
            <label>Cash on Delivery</label>
        </div>

        <div class="form-check">
            <input type="radio" name="payment" value="UPI">
            <label>UPI</label>
        </div>

        <div class="form-check">
            <input type="radio" name="payment" value="Card">
            <label>Debit / Credit Card</label>
        </div>

        <br>

        <button class="btn btn-hot w-100">Place Order</button>
    </form>

</div>

</body>
</html>
